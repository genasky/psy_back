name: Build and Deploy Psy back

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Важно для пуша в GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Используем стандартный токен GitHub
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Приводим тег к нижнему регистру (GHCR чувствителен к регистру)
          tags: |
            ghcr.io/${{ github.repository_owner }}/psy_back:latest
            ghcr.io/${{ github.repository_owner }}/psy_back:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/psy_back:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/psy_back:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Передаем переменные из GitHub Secrets в скрипт
          script: |
            cd /var/www/cope_back

            # Авторизация в реестре на сервере
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Обновление и запуск
            docker compose pull
            export IMAGE_TAG=${{ github.sha }} 
            docker compose up -d
            # docker compose up -d --remove-orphans

            # Очистка места
            docker image prune -f
